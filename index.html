<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">

<title>Vorlesung</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f2f2f7;
  color: #1c1c1e;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

.sticky-header {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  padding: 20px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-title { font-size: 24px; font-weight: 600; }

.stats {
  display:flex;
  gap:20px;
  margin-top:10px;
}

.stat-val { font-size:22px; font-weight:600; }
.stat-lbl { font-size:11px; color:#8e8e93; }

.grid {
  padding:16px;
  display:grid;
  gap:12px;
}

.card {
  background:#fff;
  border-radius:16px;
  padding:14px;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.card-header {
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.sessions { margin-top:10px; }

.session-row {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  cursor:pointer;
}

.done { opacity:0.4; text-decoration: line-through; }

.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav-item {
  text-align:center;
  font-size:12px;
  color:#8e8e93;
}

.active { color:#007aff; font-weight:600; }

.module-selector {
  padding:10px;
}

.module-item {
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:6px;
  cursor:pointer;
}

.selected { background:#007aff20; }
</style>
</head>

<body>

<div id="app"></div>

<script>
const ICS_URL = 'https://sked.lin.hs-osnabrueck.de/sked/grp/24DNE2-4.ics';

let modules = [];
let checked = {};
let selectedModules = JSON.parse(localStorage.getItem("selectedModules") || "[]");
let activeTab = "all";

function haptic() {
  if (navigator.vibrate) navigator.vibrate(10);
}

async function fetchICS() {
  const res = await fetch(ICS_URL);
  return await res.text();
}

function parseICS(text) {
  const events = [];
  const blocks = text.split("BEGIN:VEVENT");

  blocks.forEach(block => {
    const summary = (block.match(/SUMMARY:(.+)/) || [])[1];
    const uid = (block.match(/UID:(.+)/) || [])[1];

    if(summary && uid) {
      events.push({ summary, uid });
    }
  });

  const map = {};
  events.forEach(e => {
    if(!map[e.summary]) map[e.summary] = [];
    map[e.summary].push(e);
  });

  return Object.keys(map).map(name => ({
    name,
    id: name,
    sessions: map[name]
  }));
}

function toggle(uid) {
  haptic();
  checked[uid] = !checked[uid];
  render();
}

function toggleModule(name) {
  haptic();
  if(selectedModules.includes(name)) {
    selectedModules = selectedModules.filter(m => m !== name);
  } else {
    selectedModules.push(name);
  }
  localStorage.setItem("selectedModules", JSON.stringify(selectedModules));
  render();
}

function setTab(tab) {
  haptic();
  activeTab = tab;
  render();
}

function render() {

  const filteredModules = modules.filter(mod => {
    if(activeTab === "all") return true;
    return selectedModules.includes(mod.name);
  });

  const total = filteredModules.reduce((s,m)=>s+m.sessions.length,0);
  const done = filteredModules.reduce((s,m)=>s+m.sessions.filter(x=>checked[x.uid]).length,0);

  document.getElementById("app").innerHTML = `
    <div class="sticky-header">
      <div class="header-title">Vorlesungen</div>
      <div class="stats">
        <div>
          <div class="stat-val">${done}</div>
          <div class="stat-lbl">Erledigt</div>
        </div>
        <div>
          <div class="stat-val">${total-done}</div>
          <div class="stat-lbl">Offen</div>
        </div>
      </div>

      ${activeTab === "my" ? `
      <div class="module-selector">
        ${modules.map(m=>`
          <div onclick="toggleModule('${m.name}')" class="module-item ${selectedModules.includes(m.name) ? "selected":""}">
            ${m.name}
          </div>
        `).join("")}
      </div>`:""}
    </div>

    <div class="grid">
      ${filteredModules.map(mod=>`
        <div class="card">
          <div class="card-header">${mod.name}</div>
          <div class="sessions">
            ${mod.sessions.map(s=>`
              <div class="session-row ${checked[s.uid] ? "done":""}" onclick="toggle('${s.uid}')">
                <span>${s.uid.substring(0,8)}</span>
                <span>${checked[s.uid] ? "✓":""}</span>
              </div>
            `).join("")}
          </div>
        </div>
      `).join("")}
    </div>

    <div class="bottom-nav">
      <div class="nav-item ${activeTab==="all"?"active":""}" onclick="setTab('all')">📚<br>Alle</div>
      <div class="nav-item ${activeTab==="my"?"active":""}" onclick="setTab('my')">⭐<br>Meine</div>
    </div>
  `;
}

async function init() {
  const text = await fetchICS();
  modules = parseICS(text);
  render();
}

init();
</script>

</body>
</html>
